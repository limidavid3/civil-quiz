const uploadImage = async (base64, mimeType, filename) => {
  const base64Data = base64.split(",")[1];
  const byteChars  = atob(base64Data);
  const byteArr    = new Uint8Array(byteChars.length);
  for (let i=0; i<byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
  const blob = new Blob([byteArr], { type: mimeType });
  const r = await fetch(SB_URL + "/storage/v1/object/" + BUCKET + "/" + filename, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": mimeType, "x-upsert": "true" },
    body: blob,
  });
  if (!r.ok) throw new Error("圖片上傳失敗");
  return SB_URL + "/storage/v1/object/public/" + BUCKET + "/" + filename;
};

const loadBank = async () => {
  const r = await fetch(SB_URL + "/rest/v1/" + TABLE + "?select=*&order=created_at.asc", { headers: sbH() });
  if (!r.ok) throw new Error("載入失敗");
  return await r.json();
};

const insertQuestion = async (item) => {
  const r = await fetch(SB_URL + "/rest/v1/" + TABLE, {
    method: "POST",
    headers: { ...sbH(), "Prefer": "return=representation" },
    body: JSON.stringify(item),
  });
  if (!r.ok) { const e = await r.text(); throw new Error("新增失敗: " + e); }
  const arr = await r.json();
  return arr[0];
};

const updateQuestion = async (id, fields) => {
  const r = await fetch(SB_URL + "/rest/v1/" + TABLE + "?id=eq." + id, {
    method: "PATCH",
    headers: { ...sbH(), "Prefer": "return=representation" },
    body: JSON.stringify(fields),
  });
  if (!r.ok) throw new Error("更新失敗");
};

const deleteQuestion = async (id) => {
  const r = await fetch(SB_URL + "/rest/v1/" + TABLE + "?id=eq." + id, {
    method: "DELETE",
    headers: sbH(),
  });
  if (!r.ok) throw new Error("刪除失敗");
};

function App() {

}

function HomeScreen({ bank, onStart, onPaper }) {
  const [selKeys, setSelKeys] = useState([]);
  const [qCount,  setQCount]  = useState(10);
  const [byUnit,  setByUnit]  = useState(true);
  const [mode,    setMode]    = useState("quiz");
  const [openSid, setOpenSid] = useState(null);
  const bk=(sid,uid)=>`${sid}_${uid}`;
  const cntFor=(sid,uid)=>bank.filter(q=>q.sid===sid&&q.uid===uid).length;
  const totalSel=selKeys.reduce((s,k)=>{const[a,b]=k.split("_");return s+cntFor(a,b);},0);
  const toggle=k=>setSelKeys(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);
  const toggleSub=sub=>{
    const keys=sub.units.filter(u=>cntFor(sub.id,u.id)>0).map(u=>bk(sub.id,u.id));
    const all=keys.length>0&&keys.every(k=>selKeys.includes(k));
    setSelKeys(p=>all?p.filter(k=>!keys.includes(k)):[...new Set([...p,...keys])]);
  };
  const go=()=>{
    if(!totalSel)return;
    const pool=selKeys.flatMap(k=>{const[a,b]=k.split("_");return bank.filter(q=>q.sid===a&&q.uid===b);});
    const picked=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(qCount,pool.length));
    const final=byUnit?[...picked].sort((a,b)=>{
      const si=SUBJECTS.findIndex(s=>s.id===a.sid)-SUBJECTS.findIndex(s=>s.id===b.sid);
      if(si!==0)return si;
      return getSub(a.sid).units.findIndex(u=>u.id===a.uid)-getSub(a.sid).units.findIndex(u=>u.id===b.uid);
    }):picked;
    const sess={questions:final,qIdx:0,showAns:false,results:[],byUnit};
    if(mode==="paper")onPaper(sess);else onStart(sess);
  };
  const activeSubs=SUBJECTS.filter(sub=>sub.units.some(u=>cntFor(sub.id,u.id)>0));
  return (
    <div style={{animation:"fadein .4s ease"}}>
      <div style={{padding:"28px 0 24px",textAlign:"center"}}>
        <div style={{fontSize:"clamp(28px,6vw,42px)",fontWeight:700,letterSpacing:"-1px",lineHeight:1.1,marginBottom:"8px"}}>隨機出題</div>
        <div style={{fontSize:"13px",color:"#555"}}>選擇範圍 · 設定題數 · 開始作答</div>
      </div>
      {activeSubs.length===0?(
        <div style={{textAlign:"center",padding:"48px 20px",background:"rgba(255,255,255,0.02)",borderRadius:"14px",border:"1px dashed rgba(255,255,255,0.07)",color:"#444"}}>
          <div style={{fontSize:"36px",marginBottom:"12px"}}>📭</div>
          <div style={{fontSize:"14px",color:"#555",marginBottom:"6px"}}>題庫是空的</div>
          <div style={{fontSize:"12px",color:"#333"}}>點右上角「🗄 題庫」按鈕上傳題目</div>
        </div>
      ):(
        <>
          <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"20px"}}>
            {activeSubs.map(sub=>{
              const subCnt=bank.filter(q=>q.sid===sub.id).length;
              const selCnt=sub.units.filter(u=>selKeys.includes(bk(sub.id,u.id))).length;
              const allSel=sub.units.filter(u=>cntFor(sub.id,u.id)>0).every(u=>selKeys.includes(bk(sub.id,u.id)));
              const open=openSid===sub.id;
              return(
                <div key={sub.id} style={{borderRadius:"11px",border:`1px solid ${selCnt>0?sub.border:"rgba(255,255,255,0.07)"}`,background:selCnt>0?sub.bg:"rgba(255,255,255,0.02)",overflow:"hidden",transition:"border .2s,background .2s"}}>
                  <div style={{display:"flex",alignItems:"center",padding:"11px 14px",gap:"8px",cursor:"pointer"}} onClick={()=>setOpenSid(open?null:sub.id)}>
                    <div onClick={e=>{e.stopPropagation();toggleSub(sub);}} style={{width:22,height:22,borderRadius:6,flexShrink:0,background:allSel?sub.color:"transparent",border:`2px solid ${allSel?sub.color:selCnt>0?sub.color+"88":"#333"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"white",cursor:"pointer"}}>
                      {allSel?"✓":selCnt>0?<div style={{width:8,height:8,borderRadius:2,background:sub.color}}/>:""}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"14px",fontWeight:700,color:selCnt>0?sub.color:"#aaa"}}>{sub.name}</div>
                      <div style={{fontSize:"11px",color:"#444",marginTop:"1px"}}>{selCnt>0?`已選 ${selCnt} 單元 · `:""}{subCnt} 題</div>
                    </div>
                    <div style={{fontSize:"12px",color:"#444",transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>▼</div>
                  </div>
                  {open&&(
                    <div style={{padding:"0 14px 12px",display:"flex",gap:"6px",flexWrap:"wrap",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                      {sub.units.filter(u=>cntFor(sub.id,u.id)>0).map(u=>{
                        const cnt=cntFor(sub.id,u.id),k=bk(sub.id,u.id),sel=selKeys.includes(k);
                        return(
                          <button key={u.id} onClick={()=>toggle(k)} style={{marginTop:"7px",padding:"5px 11px",borderRadius:"7px",fontSize:"12px",display:"flex",alignItems:"center",gap:"4px",background:sel?sub.bg:"rgba(255,255,255,0.03)",border:`1px solid ${sel?sub.border:"rgba(255,255,255,0.07)"}`,color:sel?sub.color:"#666",fontWeight:sel?700:400}}>
                            <span style={{fontSize:"9px",color:IMP.colors[u.imp]}}>{IMP.stars[u.imp]}</span>
                            {u.name}<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",opacity:.6}}>{cnt}</span>
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {totalSel>0&&(
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"16px",marginBottom:"16px"}}>
              <div style={{display:"flex",gap:"7px",marginBottom:"14px"}}>
                {[{v:"quiz",icon:"✏️",l:"互動作答"},{v:"paper",icon:"🖨",l:"產出考卷"}].map(({v,icon,l})=>(
                  <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:"9px",borderRadius:"9px",fontSize:"13px",fontWeight:mode===v?700:400,background:mode===v?"rgba(79,130,204,0.14)":"rgba(255,255,255,0.02)",border:`1px solid ${mode===v?"rgba(79,130,204,0.35)":"rgba(255,255,255,0.07)"}`,color:mode===v?"#4f82cc":"#666"}}>{icon} {l}</button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}}>
                <div>
                  <div style={{fontSize:"13px",color:"#a0a0b8"}}>依單元分組</div>
                  <div style={{fontSize:"10px",color:"#3e3e50",marginTop:"1px"}}>{byUnit?"按科目／單元排列":"隨機混合順序"}</div>
                </div>
                <Toggle val={byUnit} set={setByUnit}/>
              </div>
              <div>
                <div style={{fontSize:"12px",color:"#666",marginBottom:"8px"}}>
                  題數：<span style={{color:"#4f82cc",fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:"14px"}}>{Math.min(qCount,totalSel)}</span>
                  <span style={{color:"#333",marginLeft:4}}>/ {totalSel} 題可用</span>
                </div>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
                  {[5,10,15,20,25,30].filter(n=>n<=totalSel+4).map(n=>(
                    <button key={n} onClick={()=>setQCount(n)} disabled={n>totalSel}
                      style={{padding:"6px 13px",borderRadius:"7px",fontSize:"13px",fontWeight:qCount===n?700:400,background:qCount===n?"rgba(79,130,204,0.14)":"rgba(255,255,255,0.03)",border:`1px solid ${qCount===n?"rgba(79,130,204,0.35)":"rgba(255,255,255,0.07)"}`,color:n>totalSel?"#1e1e2e":qCount===n?"#4f82cc":"#666"}}>{n}</button>
                  ))}
                  <input type="number" min={1} max={totalSel} value={qCount} onChange={e=>setQCount(Math.max(1,Math.min(totalSel,parseInt(e.target.value)||1)))}
                    style={{width:60,padding:"6px 8px",borderRadius:"7px",fontSize:"13px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",color:"#aaa",outline:"none",textAlign:"center"}}/>
                </div>
              </div>
            </div>
          )}
          <button onClick={go} disabled={!totalSel} style={{width:"100%",padding:"16px",borderRadius:"13px",fontSize:"17px",fontWeight:700,background:totalSel?"linear-gradient(135deg,#4f82cc,#2f5fa0)":"rgba(255,255,255,0.03)",border:"none",color:totalSel?"white":"#1e1e2e",boxShadow:totalSel?"0 6px 24px rgba(79,130,204,0.3)":"none",letterSpacing:".5px"}}>
            {!totalSel?"請先選擇科目範圍":mode==="paper"?`產出 ${Math.min(qCount,totalSel)} 題考卷`:`開始 ${Math.min(qCount,totalSel)} 題作答 →`}
          </button>
        </>
      )}
    </div>
  );
}

function QuizScreen({ session, setSession, setScreen, setLb }) {
  const{questions,qIdx,showAns}=session;

  useEffect(()=>{
    if(prevQIdx.current!==qIdx){ setShowExp(false); prevQIdx.current=qIdx; }
  },[qIdx]);

  const reveal=()=>setSession(s=>({...s,showAns:true}));
  const mark=(correct)=>{
    const nr=[...session.results,{...q,correct}];
    if(qIdx+1>=questions.length){setSession(s=>({...s,results:nr}));setScreen(SCREENS.RESULT);}
    else setSession(s=>({...s,results:nr,qIdx:qIdx+1,showAns:false}));

function BankDrawer({ bank, refreshBank, syncState, onClose, setLb }) {
  const[sid,setSid]=useState(SUBJECTS[0].id);
  const[unitId,setUnitId]=useState(SUBJECTS[0].units[0].id);
  const[editId,setEditId]=useState(null);
  const[uploading,setUploading]=useState([]);
  const[opState,setOpState]=useState("ok"); // ok | saving | error
  const qRef=useRef();
  const sub=getSub(sid),unit=getUnit(sid,unitId),items=(bank||[]).filter(q=>q.sid===sid&&q.uid===unitId);

  const addQImgs = async (files) => {
    const arr = Array.from(files).filter(f=>f.type.startsWith("image/"));
    if (!arr.length) return;
    const uploadIds = arr.map(f=>({ id:genId(), name:f.name, step:"reading" }));
    setUploading(prev=>[...prev,...uploadIds]);

    for (let i=0; i<arr.length; i++) {
      const f=arr[i], ue=uploadIds[i];
      try {
        setUploading(prev=>prev.map(u=>u.id===ue.id?{...u,step:"reading"}:u));
        const b64 = await toBase64(f);

        // Upload image to Supabase Storage
        setUploading(prev=>prev.map(u=>u.id===ue.id?{...u,step:"uploading"}:u));
        const filename = Date.now() + "_" + Math.random().toString(36).slice(2,8) + "." + f.name.split(".").pop();
        const qUrl = await uploadImage(b64, f.type, filename);

        // AI generate explanation via Cloudflare Worker
        setUploading(prev=>prev.map(u=>u.id===ue.id?{...u,step:"ai"}:u));
        const subName=getSub(sid)?.name||"", unitName=getUnit(sid,unitId)?.name||"";
        let explanation = "";
        try {
          const resp = await fetch(AI_WORKER, {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ imageUrl: qUrl, subName, unitName })
          });
          const d = await resp.json();
          explanation = d.explanation || "";
        } catch {}

        // Save to Supabase DB
        setUploading(prev=>prev.map(u=>u.id===ue.id?{...u,step:"saving"}:u));
        await insertQuestion({ sid, uid:unitId, q_url:qUrl, a_url:"", source_year:"", source_type:"", explanation });
        setUploading(prev=>prev.map(u=>u.id===ue.id?{...u,step:"done"}:u));
      } catch(e) {
        setUploading(prev=>prev.map(u=>u.id===ue.id?{...u,step:"error"}:u));
      }
    }
    setTimeout(()=>setUploading(prev=>prev.filter(u=>!uploadIds.find(x=>x.id===u.id))),3000);
    refreshBank();
  };

  const setAImg = async (id, file) => {
    if (!file||!file.type.startsWith("image/")) return;
    setOpState("saving");
    try {
      const b64 = await toBase64(file);
      const filename = Date.now()+"_a."+file.name.split(".").pop();
      const aUrl = await uploadImage(b64, file.type, filename);
      await updateQuestion(id, { a_url: aUrl });
      refreshBank();
      setOpState("ok");
    } catch { setOpState("error"); }
  };

  const patch = async (id, fields) => {
    setOpState("saving");
    try {
      // map frontend fields to DB columns
      const dbFields = {};
      if (fields.source !== undefined) {
        dbFields.source_year = fields.source?.year || "";
        dbFields.source_type = fields.source?.type || "";
      }
      if (fields.explanation !== undefined) dbFields.explanation = fields.explanation;
      if (fields.a_url !== undefined) dbFields.a_url = fields.a_url;
      await updateQuestion(id, dbFields);
      refreshBank();
      setOpState("ok");
    } catch { setOpState("error"); }
  };

  const del = async (id) => {
    setOpState("saving");
    try { await deleteQuestion(id); refreshBank(); setOpState("ok"); }

  };

const EXAM_TYPES = [
  { id:"technician", label:"技師" },
  { id:"highexam",   label:"高考" },
  { id:"special",    label:"地特" },
  { id:"state",      label:"國營" },
  { id:"textbook",   label:"課本" },
  { id:"other",      label:"其他" },
];

// format source object → display string
const fmtSource = (src) => {
  if (!src || typeof src === "string") return src || "";
  const parts = [];
  if (src.year) parts.push(`${src.year}年`);
  if (src.type) { const t = EXAM_TYPES.find(e=>e.id===src.type); if(t) parts.push(t.label); }
  return parts.join("・");
};

function BankItem({ item, idx, sub, editing, setEditing, onDel, onPatch, onSetAImg, onLb }) {
  const [year, setYear] = useState(item.source_year||"");
  const [type, setType] = useState(item.source_type||"");
  const [confirmDel, setConfirmDel] = useState(false);
  const [regenState, setRegenState] = useState("idle");
  const [expanded, setExpanded] = useState(false);
  const aRef = useRef();

  useEffect(()=>{
    setYear(item.source_year||""); setType(item.source_type||"");
  },[item.id]);

  const save = () => { onPatch({ source: { year: year.trim(), type } }); setEditing(false); };
  const display = fmtSource({ year: item.source_year, type: item.source_type });

  const regenExplanation = async () => {
    if (!item.q_url) return;
    setRegenState("loading");
    try {


      const resp = await fetch(AI_WORKER, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ imageUrl: item.q_url, subName: sub?.name||"", unitName: "" })
      });
      const data = await resp.json();
      const txt  = data.explanation || "";
      if (txt) {
        onPatch({ explanation: txt });
        setRegenState("done");
        setTimeout(()=>setRegenState("idle"), 2000);
      } else {
        setRegenState("error");
        setTimeout(()=>setRegenState("idle"), 2500);
      }
    } catch {
      setRegenState("error");
      setTimeout(()=>setRegenState("idle"), 2500);
    }
  };

  return (
    <div style={{borderRadius:"9px",border:`1px solid ${editing?sub.border:"rgba(255,255,255,0.06)"}`,background:editing?sub.bg:"rgba(255,255,255,0.02)",overflow:"hidden"}}>
      {/* Top bar */}
      <div style={{padding:"7px 9px",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:editing?"8px":"0"}}>
          <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"10px",color:sub.color,fontWeight:700}}>#{idx+1}</span>
          {!editing && <>
            {display && <span style={{fontSize:"10px",color:"#666",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📌 {display}</span>}
            <div style={{flex:1}}/>
            <button onClick={()=>setEditing(true)} style={{padding:"2px 8px",borderRadius:"4px",fontSize:"10px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",color:"#555",cursor:"pointer"}}>出處</button>
            {(item.explanation)&&<span style={{fontSize:"9px",color:"#7255b8",background:"rgba(114,85,184,0.1)",border:"1px solid rgba(114,85,184,0.2)",borderRadius:"3px",padding:"1px 5px"}}>🤖</span>}
          </>}
          {editing && <div style={{flex:1,fontSize:"11px",color:sub.color,fontWeight:600}}>編輯出處</div>}
          <button onClick={()=>setConfirmDel(true)} style={{padding:"2px 6px",borderRadius:"4px",fontSize:"10px",background:"transparent",border:"1px solid rgba(255,255,255,0.05)",color:"#3a2525",flexShrink:0,cursor:"pointer"}}>✕</button>
        </div>

        {/* Edit fields */}
        {editing && (
          <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
            {/* Year */}
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{fontSize:"11px",color:"#666",flexShrink:0,width:"28px"}}>年份</span>
              <input
                value={year} onChange={e=>setYear(e.target.value.replace(/\D/g,"").slice(0,4))}
                placeholder="例：113"
                style={{width:"80px",padding:"4px 8px",borderRadius:"5px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:"#ddd",fontSize:"12px",outline:"none",textAlign:"center"}}
              />
              <span style={{fontSize:"11px",color:"#555"}}>年</span>
            </div>
            {/* Type chips */}
            <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
              <span style={{fontSize:"11px",color:"#666",flexShrink:0,width:"28px"}}>類別</span>
              {EXAM_TYPES.map(e=>{
                const sel = type===e.id;
                return (
                  <button key={e.id} onClick={()=>setType(sel?"":e.id)}
                    style={{padding:"3px 10px",borderRadius:"20px",fontSize:"11px",fontWeight:sel?700:400,background:sel?sub.bg:"rgba(255,255,255,0.03)",border:`1px solid ${sel?sub.border:"rgba(255,255,255,0.08)"}`,color:sel?sub.color:"#555",cursor:"pointer"}}>
                    {sel?"✓ ":""}{e.label}
                  </button>
                );
              })}
            </div>
            {/* Save */}
            <div style={{display:"flex",gap:"6px",justifyContent:"flex-end"}}>
              <button onClick={()=>setEditing(false)} style={{padding:"4px 12px",borderRadius:"5px",fontSize:"11px",background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#555",cursor:"pointer"}}>取消</button>
              <button onClick={save} style={{padding:"4px 12px",borderRadius:"5px",fontSize:"11px",background:"rgba(61,158,110,0.14)",border:"1px solid rgba(61,158,110,0.25)",color:"#3d9e6e",fontWeight:700,cursor:"pointer"}}>儲存</button>
            </div>
          </div>
        )}
      </div>

      {confirmDel && <ConfirmDeleteModal onConfirm={()=>{setConfirmDel(false);onDel();}} onClose={()=>setConfirmDel(false)}/>}

      {/* Expand toggle */}
      <div style={{display:"flex",alignItems:"center",padding:"5px 9px",borderTop:"1px solid rgba(255,255,255,0.04)",gap:"8px",cursor:"pointer"}} onClick={()=>setExpanded(v=>!v)}>
        <div style={{flex:1,display:"flex",gap:"8px",alignItems:"center"}}>
          {item.q_url?<span style={{fontSize:"10px",color:"#4f82cc"}}>🖼 題目</span>:<span style={{fontSize:"10px",color:"#333"}}>🖼 無題目</span>}
          {item.a_url?<span style={{fontSize:"10px",color:"#3d9e6e"}}>✓ 答案</span>:<span style={{fontSize:"10px",color:"#333"}}>+ 無答案</span>}
          {item.explanation?<span style={{fontSize:"10px",color:"#7255b8"}}>🤖 題解</span>:null}
        </div>
        <span style={{fontSize:"10px",color:"#444"}}>{expanded?"▲":"▼"}</span>
      </div>

      {/* Collapsible images */}
      {expanded&&(
        <div style={{borderTop:"1px solid rgba(255,255,255,0.04)"}}>
          {/* Question image */}
          <div style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
            <div style={{fontSize:"10px",color:"#4f82cc",padding:"6px 10px 4px",fontWeight:600}}>🖼 題目</div>
            <div style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:"4px 8px 8px"}}
              onClick={()=>item.q_url&&onLb({src:item.q_url,title:`#${idx+1} 題目`})}>
              {item.q_url
                ?<img src={item.q_url} style={{width:"100%",height:"auto",objectFit:"contain",display:"block",borderRadius:"6px"}} alt="q"/>
                :<div style={{fontSize:"11px",color:"#2a2a3a",textAlign:"center",padding:"20px"}}>無題目圖片</div>}
            </div>
          </div>
          {/* Answer image */}
          <div style={{background:"rgba(61,158,110,0.03)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px 4px"}}>
              <span style={{fontSize:"10px",color:"#3d9e6e",fontWeight:600}}>✓ 答案</span>
              <button onClick={()=>aRef.current?.click()} style={{fontSize:"10px",color:"#555",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"4px",padding:"2px 8px",cursor:"pointer"}}>
                {item.a_url?"換圖":"上傳答案"}
              </button>
              <input ref={aRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{onSetAImg(e.target.files?.[0]);e.target.value="";}}/>
            </div>
            <div style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 8px 8px"}}
              onClick={()=>item.a_url&&onLb({src:item.a_url,title:`#${idx+1} 答案`})}>
              {item.a_url
                ?<img src={item.a_url} style={{width:"100%",height:"auto",objectFit:"contain",display:"block",borderRadius:"6px"}} alt="a"/>
                :<div style={{fontSize:"11px",color:"#2a4a3a",textAlign:"center",padding:"20px",cursor:"pointer"}} onClick={()=>aRef.current?.click()}>點擊上傳答案圖片</div>}
            </div>
          </div>
        </div>
      )}

      {/* Regenerate explanation button */}
      <div style={{padding:"6px 9px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
        <button onClick={regenExplanation} disabled={regenState==="loading"||!item.q_url}
          style={{width:"100%",padding:"5px",borderRadius:"5px",fontSize:"10px",fontWeight:600,
            background: regenState==="done"?"rgba(61,158,110,0.1)": regenState==="error"?"rgba(217,95,59,0.1)":"rgba(114,85,184,0.08)",
            border:`1px solid ${regenState==="done"?"rgba(61,158,110,0.25)":regenState==="error"?"rgba(217,95,59,0.25)":"rgba(114,85,184,0.2)"}`,
            color: regenState==="done"?"#3d9e6e": regenState==="error"?"#d95f3b":"#7255b8",
            cursor: regenState==="loading"||!item.q_url?"not-allowed":"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}}>
          {regenState==="loading"
            ? <><span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> AI 生成題解中…</>
            : regenState==="done" ? "✓ 題解已更新"
            : regenState==="error" ? "✕ 生成失敗，請重試"
            : <>{item.explanation?"🤖 重新生成題解":"🤖 生成 AI 題解"}</>
          }
        </button>
      </div>
    </div>
  );

function PasswordModal({ onSuccess, onClose }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  const inputRef = useRef();
  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(), 100); },[]);
  const submit = () => {
    if (pw === BANK_PASSWORD) { onSuccess(); }
    else { setErr(true); setPw(""); setTimeout(()=>setErr(false), 1200); }
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:"#14141c",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"16px",padding:"28px 24px",width:"100%",maxWidth:"320px",textAlign:"center"}}>
        <div style={{fontSize:"28px",marginBottom:"12px"}}>🔒</div>
        <div style={{fontSize:"15px",fontWeight:700,marginBottom:"4px"}}>題庫管理</div>
        <div style={{fontSize:"12px",color:"#555",marginBottom:"20px"}}>請輸入密碼</div>
        <input
          ref={inputRef}
          type="password"
          value={pw}
          onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&submit()}
          placeholder="輸入密碼"
          style={{width:"100%",padding:"11px 14px",borderRadius:"9px",background:err?"rgba(217,95,59,0.12)":"rgba(255,255,255,0.06)",border:`1px solid ${err?"rgba(217,95,59,0.5)":"rgba(255,255,255,0.1)"}`,color:"#ddd",fontSize:"15px",outline:"none",textAlign:"center",letterSpacing:"4px",marginBottom:"8px",transition:"border .2s,background .2s"}}
        />
        {err && <div style={{fontSize:"12px",color:"#d95f3b",marginBottom:"8px"}}>密碼錯誤，請再試一次</div>}
        <div style={{display:"flex",gap:"8px",marginTop:"4px"}}>
          <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:"8px",background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#666",fontSize:"13px",cursor:"pointer"}}>取消</button>
          <button onClick={submit} style={{flex:1,padding:"10px",borderRadius:"8px",background:"linear-gradient(135deg,#4f82cc,#2f5fa0)",border:"none",color:"white",fontSize:"13px",fontWeight:700,cursor:"pointer"}}>確認</button>
        </div>
      </div>
    </div>
  );
}

function ConfirmDeleteModal({ onConfirm, onClose }) {
  const [step, setStep] = useState(1); // 1 = 第一次確認, 2 = 第二次確認
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:"#14141c",border:"1px solid rgba(217,95,59,0.3)",borderRadius:"16px",padding:"28px 24px",width:"100%",maxWidth:"300px",textAlign:"center"}}>
        <div style={{fontSize:"28px",marginBottom:"12px"}}>{step===1?"🗑":"⚠️"}</div>
        <div style={{fontSize:"15px",fontWeight:700,marginBottom:"8px",color:"#d95f3b"}}>
          {step===1?"確定要刪除？":"再次確認刪除"}
        </div>
        <div style={{fontSize:"12px",color:"#666",marginBottom:"20px",lineHeight:1.6}}>
          {step===1?"這道題目將會從雲端題庫中移除。":"此操作無法復原，確定要永久刪除這道題目嗎？"}
        </div>
        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:"8px",background:"transparent",border:"1px solid rgba(255,255,255,0.08)",color:"#666",fontSize:"13px",cursor:"pointer"}}>取消</button>
          <button onClick={()=>{ if(step===1) setStep(2); else onConfirm(); }}
            style={{flex:1,padding:"10px",borderRadius:"8px",background:"rgba(217,95,59,0.15)",border:"1px solid rgba(217,95,59,0.4)",color:"#d95f3b",fontSize:"13px",fontWeight:700,cursor:"pointer"}}>
            {step===1?"刪除":"確定刪除"}
          </button>
        </div>
      </div>
    </div>
  );
}
function Pill({children,color,bg,border}){return<span style={{padding:"3px 9px",borderRadius:"20px",fontSize:"11px",fontWeight:700,background:bg,border:`1px solid ${border}`,color,whiteSpace:"nowrap"}}>{children}</span>;}
function Toggle({val,set}){return<div onClick={()=>set(!val)} style={{width:44,height:24,borderRadius:12,background:val?"#4f82cc":"rgba(255,255,255,0.08)",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}><div style={{position:"absolute",top:3,left:val?22:3,width:18,height:18,borderRadius:"50%",background:"white",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,0.4)"}}/></div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
